<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kur'an-ı Kerim Okuma ve Takip Paneli</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #1b5e20;
            --accent-color: #a5d6a7;
            --sidebar-bg: #262626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            background-color: var(--card-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border-bottom: 2px solid var(--primary-color);
        }

        header h1 {
            font-size: 1.3rem;
            color: var(--accent-color);
        }

        .menu-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background-color: #2e7d32;
        }

        /* Yan Menü (Sidebar) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background-color: var(--sidebar-bg);
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            transition: left 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Sekme Sistemi */
        .tabs {
            display: flex;
            background-color: #1a1a1a;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            color: #aaa;
            font-weight: bold;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            background-color: var(--sidebar-bg);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .fihrist-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 5px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .fihrist-item:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .fihrist-item span.page-no {
            font-size: 0.9rem;
            color: var(--accent-color);
            background-color: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Sayfa Gösterim Alanı */
        .quran-container {
            margin: 20px auto;
            max-width: 650px;
            width: 95%;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .quran-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Sabit Alt Kontrol Paneli */
        .control-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--card-bg);
            padding: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #2e7d32;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #424242;
            color: #757575;
            cursor: not-allowed;
            transform: none;
        }

        .page-info {
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-input {
            width: 75px;
            padding: 6px;
            text-align: center;
            font-size: 1.1rem;
            border: 2px solid var(--primary-color);
            background-color: var(--bg-color);
            color: white;
            border-radius: 6px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <button class="menu-btn" onclick="toggleSidebar()">📖 Fihrist Menü</button>
        <h1>Kur'an-ı Kerim Paneli</h1>
        <div style="width: 80px;"></div>
    </header>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Hızlı Navigasyon</h3>
            <button class="close-btn" onclick="toggleSidebar()">&times;</button>
        </div>
        <div class="tabs">
            <button id="sureTab" class="tab active" onclick="switchTab('sure')">Sureler</button>
            <button id="cuzTab" class="tab" onclick="switchTab('cuz')">Cüzler</button>
        </div>
        <div id="fihristList" class="list-container"></div>
    </div>

    <div class="quran-container">
        <img id="quranImage" class="quran-page" src="" alt="Sayfa yükleniyor...">
    </div>

    <div class="control-panel">
        <button id="nextBtn" class="btn" onclick="changePage(1)">◀ Sonraki S.</button>
        
        <div class="page-info">
            S. <input type="number" id="pageNumberInput" class="page-input" min="0" max="608" onchange="goToPage(this.value)"> / 608
        </div>

        <button id="prevBtn" class="btn" onclick="changePage(-1)">Önceki S. ▶</button>
    </div>

            { id: 113, name: "113. Felak", page: 603 }, { id: 114, name: "114. Nâs", page: 603 }
        ];
        let currentTab = 'sure';
        const quranImage = document.getElementById("quranImage");
        const pageInput = document.getElementById("pageNumberInput");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        const fihristList = document.getElementById("fihristList");
        function toggleSidebar() {
            sidebar.classList.toggle("open");
            overlay.classList.toggle("active");
        }
        function switchTab(tabName) {
            currentTab = tabName;
            document.getElementById("sureTab").classList.toggle("active", tabName === 'sure');
            document.getElementById("cuzTab").classList.toggle("active", tabName === 'cuz');
            renderFihrist();
        }
        function renderFihrist() {
            fihristList.innerHTML = "";
            if (currentTab === 'sure') {
                surahs.forEach(s => {
                    const item = document.createElement("div");
                    item.className = "fihrist-item";
                    item.onclick = () => { 
                        goToPage(s.page); 
                        toggleSidebar(); 
                    };
                    item.innerHTML = <span>${s.name}</span><span class="page-no">S. ${s.page}</span>;
                    fihristList.appendChild(item);
                }
                              );
            } 
            else {
                // Her cüz net 20 sayfa (0. sayfa 1. cüz başlangıcı)
                for (let i = 1; i <= 30; i++) {
                    const displayPage = (i - 1) * 20;
                    const item = document.createElement("div");
                    item.className = "fihrist-item";
                    item.onclick = () => { 
                        goToPage(displayPage); 
                        toggleSidebar(); 
                    };
                    item.innerHTML = <span>${i}. Cüz</span><span class="page-no">S. ${displayPage}</span>;
                    fihristList.appendChild(item);
                }
            }
        }
        function updatePage() {
            quranImage.src = ${IMAGE_FOLDER}${currentPage}.jpg;
            pageInput.value = currentPage;
            localStorage.setItem("savedQuranPage", currentPage);
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === TOTAL_PAGES;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function changePage(step) {
            let targetPage = currentPage + step;
            if (targetPage >= 0 && targetPage <= TOTAL_PAGES) {
                currentPage = targetPage;
                updatePage();
            }
        }
        // Doğrudan arama kutusuna yazıp gitme fonksiyonu
        function goToPage(value) {
            let page = parseInt(value);
            if (!isNaN(page) && page >= 0 && page <= TOTAL_PAGES) {
                currentPage = page;updatePage();
            } 
            else {
                pageInput.value = currentPage;
            }
        }
        renderFihrist();
        updatePage();
