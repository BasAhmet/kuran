<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kur'an-ı Kerim Okuma ve Takip Paneli</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #1b5e20;
            --accent-color: #a5d6a7;
            --sidebar-bg: #262626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            background-color: var(--card-bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border-bottom: 2px solid var(--primary-color);
        }

        header h1 {
            font-size: 1.3rem;
            color: var(--accent-color);
        }

        /* Menü Butonu */
        .menu-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background-color: #2e7d32;
        }

        /* Yan Menü (Sidebar) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background-color: var(--sidebar-bg);
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            transition: left 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Sekme Sistemi */
        .tabs {
            display: flex;
            background-color: #1a1a1a;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            color: #aaa;
            font-weight: bold;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--accent-color);
            border-bottom-2px solid var(--accent-color);
            background-color: var(--sidebar-bg);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .fihrist-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            margin-bottom: 5px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .fihrist-item:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .fihrist-item span.page-no {
            font-size: 0.9rem;
            color: var(--accent-color);
            background-color: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Sayfa Gösterim Alanı */
        .quran-container {
            margin: 20px auto;
            max-width: 650px;
            width: 95%;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .quran-page {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Sabit Alt Kontrol Paneli */
        .control-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--card-bg);
            padding: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #2e7d32;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #424242;
            color: #757575;
            cursor: not-allowed;
            transform: none;
        }

        .page-info {
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-input {
            width: 75px;
            padding: 6px;
            text-align: center;
            font-size: 1.1rem;
            border: 2px solid var(--primary-color);
            background-color: var(--bg-color);
            color: white;
            border-radius: 6px;
        }

        /* Karartma Katmanı */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>

      function toggleSidebar() {sidebar.classList.toggle("open");

                               }
      function switchTab(tabName) {currentTab = tabName;

                                  }
      function renderFihrist() {fihristList.innerHTML = "";

                                                                                });

                                else {for (let i = 1; i <= 30; i++) {const targetPage = ((i - 1) * 20) + 2; // Geleneksel düzende cüz başlangıç formülü (Örn: 2. Cüz s. 22)
