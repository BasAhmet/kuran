<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuran-ı Kerim Okuma Ekranı</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div class="max-w-3xl mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        
        <!-- Üst Kontrol Paneli -->
        <div class="p-4 bg-emerald-700 text-white flex flex-col sm:flex-row gap-3 items-center justify-between sticky top-0 z-10 shadow-md">
            
            <!-- Kullanıcı Giriş/Çıkış Alanı -->
            <div id="kullaniciPaneli" class="flex items-center gap-3 w-full sm:w-auto">
                <button id="btnGiris" class="bg-white text-emerald-700 hover:bg-gray-100 px-4 py-2 rounded font-bold transition w-full sm:w-auto shadow">
                    Google ile Giriş Yap
                </button>
                <div id="kullaniciBilgi" class="hidden flex items-center gap-2">
                    <img id="profilFoto" src="" alt="Profil" class="w-8 h-8 rounded-full border-2 border-white">
                    <span id="kullaniciAdi" class="text-sm font-semibold truncate w-24"></span>
                    <button id="btnCikis" class="bg-red-500 hover:bg-red-400 text-white px-2 py-1 rounded text-xs font-bold transition">Çıkış</button>
                </div>
            </div>

            <div class="flex gap-2 w-full sm:w-auto">
                <select id="sureSecim" class="text-black px-2 py-1 rounded w-full sm:w-32">
                    <option value="">Sure Seç...</option>
                </select>
                <select id="cuzSecim" class="text-black px-2 py-1 rounded w-full sm:w-32">
                    <option value="">Cüz Seç...</option>
                </select>
            </div>

            <div class="flex gap-1 w-full sm:w-auto">
                <input type="number" id="sayfaInput" min="1" max="609" placeholder="Sayfa (1-609)" class="text-black px-2 py-1 rounded w-full sm:w-24">
                <button id="btnSayfaGit" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded font-semibold transition">Git</button>
            </div>
        </div>

        <!-- Resim Görüntüleme Alanı -->
        <div class="flex-1 flex justify-center items-start p-2 bg-gray-200 overflow-y-auto">
            <img id="kuranSayfasi" src="pages/0.jpg" alt="Kuran Sayfası" class="max-w-full h-auto shadow-xl border-2 border-gray-300">
        </div>

        <!-- Alt Navigasyon -->
        <div class="p-4 bg-emerald-700 text-white flex justify-between items-center sticky bottom-0 z-10 shadow-md">
            <button id="btnSonraki" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded font-bold transition">&larr; Sonraki</button>
            <span id="sayfaGosterge" class="font-bold text-lg bg-emerald-800 px-4 py-1 rounded">Sayfa: 1</span>
            <button id="btnOnceki" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-2 rounded font-bold transition">Önceki &rarr;</button>
        </div>

    </div>

    <!-- Modüler Script Bağlantısı -->
    <script type="module" src="main.js"></script>
</body>
</html>
